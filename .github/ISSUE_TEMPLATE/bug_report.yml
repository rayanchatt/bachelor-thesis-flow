name: Bug report
description: Report a defect in btflow.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more reproducible the
        report, the faster it can be fixed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behaviour you observed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Minimal command, code snippet, and inputs to reproduce the bug.
      render: bash
    validations:
      required: true
  - type: input
    id: btflow-version
    attributes:
      label: btflow version
      description: Run `btflow --version`.
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Run `python --version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 24.04 / ..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
