name: Regenerate figures

on:
  schedule:
    - cron: "0 4 * * 1"  # Mondays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Regenerate assets
        env:
          MPLBACKEND: Agg
        run: python scripts/regenerate_assets.py

      - name: Open PR if figures drift
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "ci: refresh figures from synthetic fixtures"
          title: "ci: refresh figures from synthetic fixtures"
          body: |
            Automated weekly figure refresh produced by
            `scripts/regenerate_assets.py`. If you see meaningful diffs in
            `assets/`, the deterministic pipeline output has changed —
            investigate before merging.
          branch: ci/refresh-figures
          delete-branch: true
          add-paths: |
            assets/
