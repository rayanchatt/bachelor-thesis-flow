name: Figures drift check

on:
  pull_request:
    branches: [main]
    paths:
      - "src/btflow/**"
      - "scripts/regenerate_assets.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    name: Synthetic figures render and stay deterministic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Regenerate synthetic assets
        env:
          MPLBACKEND: Agg
        run: python scripts/regenerate_assets.py

      - name: Upload regenerated figures
        uses: actions/upload-artifact@v7.0.1
        with:
          name: synthetic-figures
          path: assets/synthetic/
          if-no-files-found: error
